# Deploy DEV — Serverless API to AWS sa-east-1 on push to main.
# Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, CONTACT_EMAIL_*, EMAIL_DRY_RUN, CORS_ALLOWED_ORIGINS
name: Deploy DEV

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev-back
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - name: Serverless deploy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: sa-east-1
          CONTACT_EMAIL_FROM: ${{ secrets.CONTACT_EMAIL_FROM }}
          CONTACT_EMAIL_TO: ${{ secrets.CONTACT_EMAIL_TO }}
          EMAIL_DRY_RUN: ${{ secrets.EMAIL_DRY_RUN || 'false' }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          CAPTCHA_ENABLED: "false"
        run: npx serverless deploy --stage dev --region sa-east-1
